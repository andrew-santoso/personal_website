<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Santoso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #111111;
      --muted: #666666;
      --bg: #fcfcf9;
      --line: #e8e6df;

      /* golden-ratio-ish spacing scale */
      --s1: 0.75rem;
      --s2: 1.2rem;
      --s3: 1.95rem;
      --s4: 3.15rem;
      --s5: 5.1rem;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 18px;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.65;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding-top: 8rem;
      padding-left: var(--s1);
      padding-right: var(--s3);
      padding-bottom: var(--s5);
    }

    header {
      margin-bottom: var(--s5);
    }

    h1 {
      font-family: "Inter", system-ui, sans-serif;
      font-size: 2.7rem;
      line-height: 1.05;
      font-weight: 600;
      margin: 0 0 var(--s1) 0;
      letter-spacing: -0.03em;
}

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin: 0 0 var(--s3) 0;
    }

    h1, h2, nav {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }

    nav {
      font-family: "Inter", system-ui, sans-serif;
      display: flex;
      gap: var(--s2);
      flex-wrap: wrap;
      font-size: 0.95rem;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      border-bottom-color: var(--text);
    }

    section {
      margin-top: var(--s5);
    }

    h2 {
      font-family: "Inter", system-ui, sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 var(--s2) 0;
    }

    p {
      margin: 0 0 var(--s2) 0;
    }

    .list {
      display: grid;
      gap: var(--s2);
    }

    .item {
      padding: 0 0 var(--s2) 0;
      border-bottom: 1px solid var(--line);
    }

    .item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .item a {
      color: var(--text);
      text-decoration: none;
    }

    .item a:hover {
      text-decoration: underline;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 0.2rem;
    }

    footer {
      margin-top: var(--s5);
      padding-top: var(--s3);
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 680px) {
      html {
        font-size: 17px;
      }

      .page {
        padding: var(--s4) var(--s2);
      }

      h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Andrew Santoso</h1>
      <p class="subtitle">I'm just a dude making his website.</p>

      <nav>
        <a href="/articles">Articles</a>
        <a href="/projects">Projects</a>
        <a href="/about">About</a>
      </nav>
    </header>
  </main>
</body>
</html>

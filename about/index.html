<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Andrew Santoso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --text: #111111;
        --muted: #666666;
        --bg: #fcfcf9;
        --line: #e8e6df;
        --s1: 0.75rem;
        --s2: 1.2rem;
        --s3: 1.95rem;
        --s4: 3.15rem;
        --s5: 5.1rem;
      }

      * {
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        line-height: 1.75;
      }

      .page {
        max-width: 640px;
        margin: 0 auto;
        padding-top: 8rem;
        padding-left: var(--s1);
        padding-right: var(--s3);
        padding-bottom: var(--s5);
      }

      header {
        margin-bottom: var(--s3);
      }

      h1,
      h2,
      nav,
      .list-title {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      h1.site-title {
        font-size: 2.7rem;
        line-height: 1.05;
        font-weight: 500;
        margin: 0 0 var(--s1) 0;
        letter-spacing: -0.03em;
      }

      .site-title a {
        color: inherit;
        text-decoration: none;
      }

      .site-title a:hover {
        text-decoration: none;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1rem;
        margin: 0 0 var(--s3) 0;
      }

      nav {
        display: flex;
        gap: var(--s2);
        flex-wrap: wrap;
        font-size: 0.95rem;
      }

      nav a {
        color: var(--text);
        text-decoration: none;
        border-bottom: 1px solid transparent;
      }

      nav a:hover,
      nav a.active {
        border-bottom-color: var(--text);
      }

      section {
        margin-top: var(--s4);
      }

      .list {
        display: grid;
        gap: var(--s2);
      }

      .item {
        padding: 0 0 var(--s2) 0;
        border-bottom: 1px solid var(--line);
      }

      .item:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .article-title {
        color: var(--text);
        text-decoration: none;
        font-size: 1.35rem;
        line-height: 1.2;
        font-weight: 500;
        letter-spacing: -0.02em;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        display: block;
        max-width: 50ch;
        margin: 0 0 0.6rem 0;
      }

      .article-title:hover {
        text-decoration: underline;
      }

      .article-meta {
        color: var(--muted);
        font-size: 1rem;
      }

      @media (max-width: 680px) {
        html {
          font-size: 17px;
        }

        .page {
          padding: var(--s4) var(--s2);
        }

        h1.site-title {
          font-size: 2.2rem;
        }

        .item a {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1 class="site-title">
          <a href="/">Andrew Santoso</a>
        </h1>
        <p class="subtitle"></p>

        <nav>
          <a href="/articles/">Articles</a>
          <a href="/about/" class="active">About</a>
        </nav>
      </header>

      <section>
        <p>I'll write more about myself soon.</p>
      </section>
    </main>
  </body>
</html>
